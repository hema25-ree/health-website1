<script>
     function signup(){
            let user = document.getElementById("username").value.trim();
            let pass = document.getElementById("password").value.trim();

            if(user === "" || pass === ""){
                alert("⚠ Fill all fields");
                return;
            }

            if(localStorage.getItem(user)){
                alert("❌ User already exists. Please login.");
                return;
            }

            localStorage.setItem(user, pass);
            alert("✅ Signup successful! Now login.");

            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        function login(){
            let user = document.getElementById("username").value.trim();
            let pass = document.getElementById("password").value.trim();

            let storedPass = localStorage.getItem(user);

            if(storedPass === null){
                alert("❌ User not found. Please sign up.");
                return;
            }

            if(storedPass === pass){
              localStorage.setItem("currentUser", user);

        // Hide auth box and intro, show main app
        document.getElementById("authBox").style.display = "none";
        
        document.getElementById("mainApp").style.display = "block";

        // Show history button only for logged in users
        document.querySelector("button[onclick='showHistory()']").style.display = "inline-block";
 
            } else {
                 alert("❌ Wrong password");
            }
        }

       
}

function showHistory(){
    let user = localStorage.getItem("currentUser"); // get currently logged-in user

    if(!user){ 
        // if no user is logged in
        alert("⚠ You must be logged in to view history!");
        return; 
    }

    let history = JSON.parse(localStorage.getItem(user + "_history")) || [];

    if(history.length === 0){
        document.getElementById("historyBox").innerHTML = "<p>No history found.</p>";
        return;
    }

    let output = "<h3>Your Health History</h3>";
    history.forEach(item => {
        output += "🩺 " + item.issue + " - " + item.date + "<br>";
    });

    document.getElementById("historyBox").innerHTML = output;
}
// List of issues for autocomplete
const issues = [
    "fever","cold","cough","sore throat","weakness","vomiting","diarrhea","stomach pain",
    "indigestion","acidity","constipation","pimple","dark circles","dry lips","dry skin",
    "cracked heels","cuts","wound","burn","burns","sunburn","insect bite","allergy","rash",
    "toothache","ear pain","nosebleed","headache","back pain","joint pain","muscle pain",
    "sprain","dizziness","nausea","eye irritation","sore muscles"
];



// Issues that require age and weight
const weightRequiredIssues = ["fever","cold","cough","stomach pain","weakness","vomiting"];

// Autocomplete suggestions
function showSuggestions() {
    let input = document.getElementById("issueInput").value.toLowerCase();
    let box = document.getElementById("suggestions");
    box.innerHTML = "";
    if(input === "") return;

    issues.forEach(item => {
        if(item.includes(input)){
            let div = document.createElement("div");
            div.innerHTML = item;
            div.onclick = () => {
                document.getElementById("issueInput").value = item;
                box.innerHTML = "";

                toggleAgeWeight(item);
                
                
            };
            box.appendChild(div);
        }
    });
}


// Show/hide age & weight fields
function toggleAgeWeight(issue){
    if(weightRequiredIssues.includes(issue.toLowerCase())){
        document.getElementById("ageWeightFields").style.display = "block";
    } else {
        document.getElementById("ageWeightFields").style.display = "none";
    }
}

        auth.style.display = "none";
        main.style.display = "block";

        const historyBtn = document.querySelector("button[onclick='showHistory()']");
        if(historyBtn) historyBtn.style.display = "inline-block";
    } else {
        main.style.display = "none";
        auth.style.display = "none"; // ensure login/signup hidden until Start clicked
    }
};


</script>
</script>
    </div>

</body>

</html>
